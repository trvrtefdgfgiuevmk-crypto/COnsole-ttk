<!DOCTYPE html>
<html>
<head>
  <title>Matrix Console</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: monospace;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    #terminal {
      position: relative;
      z-index: 1;
      padding: 20px;
    }

    input {
      background: transparent;
      border: none;
      color: #00ff00;
      font-family: monospace;
      outline: none;
      width: 100%;
    }

    .line {
      margin-bottom: 5px;
    }
  </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div id="terminal">
  <div id="output"></div>
  <div>> <input id="input" autofocus></div>
</div>

<script>
// ===== MATRIX EFFECT =====
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#0F0";
  ctx.font = fontSize + "px monospace";

  drops.forEach((y, i) => {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, y * fontSize);

    if (y * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  });
}

setInterval(drawMatrix, 33);

// ===== TERMINAL =====
const input = document.getElementById("input");
const output = document.getElementById("output");

let logged = false;

function print(text) {
  const div = document.createElement("div");
  div.className = "line";
  div.innerText = text;
  output.appendChild(div);
  window.scrollTo(0, document.body.scrollHeight);
}

function fakeLogin(cmd) {
  const parts = cmd.split(" ");

  if (parts[1] === "admin" && parts[2] === "123") {
    logged = true;
    print("> Acesso concedido.");
  } else {
    print("> Acesso negado.");
  }
}

async function fakeScan(user) {
  print("> Conectando...");
  await new Promise(r => setTimeout(r, 500));

  print("> Buscando dados...");
  await new Promise(r => setTimeout(r, 700));

  print("> Decodificando...");
  await new Promise(r => setTimeout(r, 700));

  // ⚠️ Aqui você pode colocar API real depois
  print("");
  print("USER: " + user);
  print("BIO: exemplo bio...");
  print("SEGUIDORES: 12345");
  print("SEGUINDO: 120");
  print("CURTIDAS: 99999");
  print("");
  print("VIDEOS:");
  print("- video 1");
  print("- video 2");
  print("- video 3");
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const cmd = input.value;
    print("> " + cmd);
    input.value = "";

    const args = cmd.split(" ");

    switch(args[0]) {
      case "help":
        print("Comandos:");
        print("login admin 123");
        print("scan @usuario");
        print("clear");
        break;

      case "login":
        fakeLogin(cmd);
        break;

      case "scan":
        if (!logged) {
          print("> Faça login primeiro.");
        } else {
          fakeScan(args[1]);
        }
        break;

      case "clear":
        output.innerHTML = "";
        break;

      default:
        print("> Comando não reconhecido.");
    }
  }
});

// mensagem inicial
print("> Sistema iniciado...");
print("> Digite 'help' para comandos.");

</script>

</body>
</html>
