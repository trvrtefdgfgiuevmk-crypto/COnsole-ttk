<!DOCTYPE html>
<html>
<head>
  <title>TikTok Console</title>
  <style>
    body {
      background: black;
      color: #00ff00;
      font-family: monospace;
      padding: 20px;
    }

    input, button {
      background: black;
      color: #00ff00;
      border: 1px solid #00ff00;
      padding: 6px;
      margin-top: 5px;
    }

    pre {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h2>> TikTok Console</h2>

<input id="user" placeholder="@usuario">
<button onclick="buscar()">Executar</button>

<pre id="console"></pre>

<script>
const consoleBox = document.getElementById("console");

function delay(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function buscar() {
  const user = document.getElementById("user").value.replace("@","");
  consoleBox.innerText = "";

  const steps = [
    "> Inicializando sistema...",
    "> Conectando ao servidor...",
    "> Buscando dados reais...",
    "> Decodificando..."
  ];

  for (let s of steps) {
    consoleBox.innerText += s + "\n";
    await delay(400);
  }

  try {
    const res = await fetch(`https://st-r9yk.onrender.com/user/${user}`);
    const data = await res.json();

    consoleBox.innerText += "\n";
    consoleBox.innerText += "USER: " + data.username + "\n";
    consoleBox.innerText += "BIO: " + data.bio + "\n";
    consoleBox.innerText += "SEGUIDORES: " + data.followers + "\n";
    consoleBox.innerText += "SEGUINDO: " + data.following + "\n";
    consoleBox.innerText += "CURTIDAS: " + data.likes + "\n";
    consoleBox.innerText += "VIDEOS: " + data.videos + "\n";

  } catch (e) {
    consoleBox.innerText += "> ERRO AO BUSCAR DADOS\n";
  }
}
</script>

</body>
</html>
